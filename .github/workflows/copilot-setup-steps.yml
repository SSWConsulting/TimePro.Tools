name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - scripts/cloud-setup.sh
      - src/**/*.csproj
      - tests/**/*.csproj
      - SSW.TimePro.Timesheets.Cli.slnx
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - scripts/cloud-setup.sh
      - src/**/*.csproj
      - tests/**/*.csproj
      - SSW.TimePro.Timesheets.Cli.slnx

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: bash scripts/cloud-setup.sh

      - name: Test
        run: dotnet test SSW.TimePro.Timesheets.Cli.slnx --no-restore
